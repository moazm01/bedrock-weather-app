name: bedrock_phase1
description: "Abbottabad Bedrock Phase 1 UI Showcase"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  # State Management
  provider: ^6.1.2

  # Map
  flutter_map: ^7.0.1
  latlong2: ^0.9.1
  flutter_map_cancellable_tile_provider: ^3.0.0

  # Networking
  http: ^1.2.2

  # Device Services
  geolocator: ^13.0.1
  image_picker: ^1.1.2
  sensors_plus: ^6.1.1
  local_auth: ^2.3.0
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.1.0

  # Utilities
  url_launcher: ^6.3.0
  firebase_app_check: ^0.3.2+10
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  firebase_performance: ^0.10.1+10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
